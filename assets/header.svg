<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#DC143C" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC143C" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#DC143C" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#DC143C" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes glitch1 {
      0%, 100% { transform: translate(0, 0); opacity: 0; }
      5% { transform: translate(-3px, -1px); opacity: 0.8; }
      5.5% { opacity: 0; }
      20% { opacity: 0; }
      40% { transform: translate(2px, 1px); opacity: 0.6; }
      40.5% { opacity: 0; }
      60% { opacity: 0; }
      80% { transform: translate(-2px, -1px); opacity: 0.5; }
      80.5% { opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 100% { transform: translate(0, 0); opacity: 0; }
      15% { transform: translate(3px, 1px); opacity: 0.7; }
      15.5% { opacity: 0; }
      35% { opacity: 0; }
      55% { transform: translate(-3px, 2px); opacity: 0.5; }
      55.5% { opacity: 0; }
      75% { opacity: 0; }
      90% { transform: translate(1px, -1px); opacity: 0.4; }
      90.5% { opacity: 0; }
    }
    @keyframes glitch-clip {
      0%, 100% { clip-path: inset(0 0 0 0); }
      5% { clip-path: inset(20% 0 60% 0); }
      10% { clip-path: inset(0 0 0 0); }
      40% { clip-path: inset(60% 0 10% 0); }
      45% { clip-path: inset(0 0 0 0); }
      80% { clip-path: inset(40% 0 30% 0); }
      85% { clip-path: inset(0 0 0 0); }
    }
    @keyframes pulse-glow {
      0%, 100% { filter: url(#glow); }
      50% { filter: url(#glow-lg); }
    }
    @keyframes float-up {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(-300px); opacity: 0; }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in-delay {
      0%, 60% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes scanline {
      from { transform: translateY(-10px); }
      to { transform: translateY(310px); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes dash-move {
      to { stroke-dashoffset: -20; }
    }
    @keyframes line-draw {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes rotate-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .name-main {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 54px;
      font-weight: 900;
      fill: #FFFFFF;
      letter-spacing: 6px;
      animation: pulse-glow 4s ease-in-out infinite;
    }
    .name-g1 {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 54px;
      font-weight: 900;
      fill: #DC143C;
      letter-spacing: 6px;
      animation: glitch1 5s linear infinite, glitch-clip 5s linear infinite;
    }
    .name-g2 {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 54px;
      font-weight: 900;
      fill: #8B0000;
      letter-spacing: 6px;
      animation: glitch2 5s linear infinite;
    }
    .subtitle {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      fill: #DC143C;
      letter-spacing: 3px;
      opacity: 0;
      animation: fade-in 1.2s ease 0.8s forwards;
    }
    .subtitle-line {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      fill: #555;
      letter-spacing: 2px;
      opacity: 0;
      animation: fade-in-delay 2.5s ease forwards;
    }
    .particle { animation: float-up linear infinite; }
    .scan { animation: scanline 6s linear infinite; opacity: 0.04; }
    .bracket {
      font-family: 'Courier New', Courier, monospace;
      font-size: 24px;
      fill: #DC143C;
      filter: url(#glow);
      opacity: 0;
      animation: fade-in 1s ease 0.3s forwards;
    }
    .tag {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      fill: #444;
    }
    .status-dot { fill: #DC143C; animation: blink 2s ease-in-out infinite; }
    .status-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      fill: #DC143C;
      letter-spacing: 3px;
      opacity: 0.8;
    }
    .dashed {
      stroke: #DC143C;
      stroke-width: 1;
      stroke-dasharray: 5 5;
      stroke-opacity: 0.15;
      animation: dash-move 2s linear infinite;
    }
    .accent-line {
      stroke: #DC143C;
      stroke-width: 1;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      stroke-opacity: 0.3;
      animation: line-draw 2s ease forwards;
    }
    .hex {
      stroke: #DC143C;
      stroke-width: 0.5;
      fill: none;
      stroke-opacity: 0.08;
      transform-origin: center;
      animation: rotate-slow 30s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="900" height="300" fill="#0D1117" rx="8"/>
  <rect width="900" height="300" fill="url(#grid)" rx="8"/>
  <rect width="900" height="300" fill="url(#vignette)" rx="8"/>

  <!-- Decorative border -->
  <rect x="1" y="1" width="898" height="298" fill="none" stroke="url(#border-grad)" stroke-width="1.5" rx="8"/>

  <!-- Corner accent lines -->
  <line x1="15" y1="15" x2="60" y2="15" class="accent-line"/>
  <line x1="15" y1="15" x2="15" y2="60" class="accent-line"/>
  <line x1="885" y1="285" x2="840" y2="285" class="accent-line" style="animation-delay:0.5s"/>
  <line x1="885" y1="285" x2="885" y2="240" class="accent-line" style="animation-delay:0.5s"/>

  <!-- Dashed accent lines -->
  <line x1="80" y1="55" x2="200" y2="55" class="dashed"/>
  <line x1="700" y1="245" x2="820" y2="245" class="dashed"/>

  <!-- Background hex decoration -->
  <polygon points="750,150 775,135 800,150 800,180 775,195 750,180" class="hex"/>
  <polygon points="100,100 120,88 140,100 140,124 120,136 100,124" class="hex" style="animation-direction:reverse"/>

  <!-- Floating particles -->
  <circle cx="75" cy="280" r="1.5" fill="#DC143C" class="particle" style="animation-duration:9s;animation-delay:0s"/>
  <circle cx="145" cy="290" r="1" fill="#DC143C" class="particle" style="animation-duration:12s;animation-delay:2s"/>
  <circle cx="235" cy="275" r="2" fill="#DC143C" class="particle" style="animation-duration:10s;animation-delay:0.8s"/>
  <circle cx="320" cy="285" r="1.2" fill="#DC143C" class="particle" style="animation-duration:8.5s;animation-delay:3.2s"/>
  <circle cx="410" cy="292" r="1.8" fill="#DC143C" class="particle" style="animation-duration:11s;animation-delay:0.5s"/>
  <circle cx="490" cy="278" r="1" fill="#DC143C" class="particle" style="animation-duration:13s;animation-delay:2.5s"/>
  <circle cx="575" cy="288" r="1.5" fill="#DC143C" class="particle" style="animation-duration:8s;animation-delay:1.5s"/>
  <circle cx="645" cy="282" r="2.2" fill="#DC143C" class="particle" style="animation-duration:10.5s;animation-delay:3.8s"/>
  <circle cx="715" cy="276" r="1.2" fill="#DC143C" class="particle" style="animation-duration:9.5s;animation-delay:0.3s"/>
  <circle cx="795" cy="284" r="1.8" fill="#DC143C" class="particle" style="animation-duration:11.5s;animation-delay:2.2s"/>
  <circle cx="115" cy="270" r="0.8" fill="#DC143C" class="particle" style="animation-duration:14s;animation-delay:4.5s"/>
  <circle cx="370" cy="294" r="1.5" fill="#DC143C" class="particle" style="animation-duration:7.5s;animation-delay:1.8s"/>
  <circle cx="540" cy="273" r="2" fill="#DC143C" class="particle" style="animation-duration:12.5s;animation-delay:3s"/>
  <circle cx="670" cy="290" r="0.8" fill="#DC143C" class="particle" style="animation-duration:9s;animation-delay:0.6s"/>
  <circle cx="845" cy="280" r="1.5" fill="#DC143C" class="particle" style="animation-duration:10s;animation-delay:2.8s"/>
  <circle cx="200" cy="295" r="1.8" fill="#DC143C" class="particle" style="animation-duration:11s;animation-delay:4s"/>
  <circle cx="460" cy="270" r="1" fill="#DC143C" class="particle" style="animation-duration:13.5s;animation-delay:1s"/>
  <circle cx="830" cy="275" r="1.3" fill="#DC143C" class="particle" style="animation-duration:8s;animation-delay:3.5s"/>

  <!-- Scanline -->
  <rect x="0" y="-10" width="900" height="3" fill="#DC143C" class="scan"/>

  <!-- Name glitch layers -->
  <text x="450" y="142" text-anchor="middle" class="name-g1">ABHIRAG S V</text>
  <text x="450" y="142" text-anchor="middle" class="name-g2">ABHIRAG S V</text>
  <text x="450" y="142" text-anchor="middle" class="name-main">ABHIRAG S V</text>

  <!-- Subtitle -->
  <text x="450" y="180" text-anchor="middle" class="subtitle">FULL-STACK DEVELOPER  ·  BUILDER  ·  CREATOR</text>

  <!-- Tagline -->
  <text x="450" y="210" text-anchor="middle" class="subtitle-line">// turning ideas into production-ready code</text>

  <!-- Corner code decorations -->
  <text x="22" y="32" class="bracket">&lt;</text>
  <text x="858" y="282" class="bracket">/&gt;</text>

  <!-- Status indicator -->
  <circle cx="32" cy="275" r="3.5" class="status-dot"/>
  <text x="42" y="279" class="status-text">AVAILABLE</text>

  <!-- Version tag -->
  <text x="843" y="26" class="tag">v2.0.25</text>
</svg>
