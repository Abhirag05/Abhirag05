<svg xmlns="http://www.w3.org/2000/svg" width="850" height="450" viewBox="0 0 850 450">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>

    <!-- Clip paths for typing reveal animation -->
    <clipPath id="r0"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="0.5s" dur="0.6s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r1"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="1.2s" dur="0.3s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r2"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="1.6s" dur="0.4s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r3"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="2.1s" dur="0.4s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r4"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="2.6s" dur="0.4s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r5"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="3.1s" dur="0.5s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r6"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="3.7s" dur="0.5s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r7"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="4.3s" dur="0.6s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r8"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="5.0s" dur="0.5s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r9"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="5.6s" dur="0.7s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r10"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="6.4s" dur="0.5s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r11"><rect x="0" y="0" width="0" height="500">
      <animate attributeName="width" from="0" to="850" begin="7.0s" dur="0.3s" fill="freeze"/>
    </clipPath>
  </defs>

  <style>
    @keyframes blink-cursor {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes subtle-glow {
      0%, 100% { stroke-opacity: 0.1; }
      50% { stroke-opacity: 0.25; }
    }
    text { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', Courier, monospace; }
    .prompt { fill: #DC143C; font-size: 14px; font-weight: bold; }
    .cmd { fill: #FFFFFF; font-size: 14px; font-weight: bold; }
    .label { fill: #6E7681; font-size: 13px; }
    .value { fill: #E6EDF3; font-size: 13px; }
    .accent { fill: #DC143C; font-size: 13px; }
    .sep { fill: #DC143C; font-size: 13px; opacity: 0.4; }
    .title-text { fill: #6E7681; font-size: 12px; }
    .cursor { animation: blink-cursor 1.1s step-end infinite; }
    .border-pulse { animation: subtle-glow 4s ease-in-out infinite; }
  </style>

  <!-- Terminal body -->
  <rect width="850" height="450" fill="#0D1117" rx="12"/>

  <!-- Title bar -->
  <rect width="850" height="38" fill="url(#title-grad)" rx="12"/>
  <rect y="28" width="850" height="10" fill="url(#title-grad)"/>

  <!-- Title bar separator line -->
  <line x1="0" y1="38" x2="850" y2="38" stroke="#DC143C" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Window control dots -->
  <circle cx="22" cy="19" r="6.5" fill="#FF5F57" opacity="0.9"/>
  <circle cx="44" cy="19" r="6.5" fill="#FEBC2E" opacity="0.9"/>
  <circle cx="66" cy="19" r="6.5" fill="#28C840" opacity="0.9"/>

  <!-- Title bar text -->
  <text x="425" y="24" text-anchor="middle" class="title-text">abhirag@dev: ~/portfolio</text>

  <!-- Animated border -->
  <rect x="0.5" y="0.5" width="849" height="449" fill="none" stroke="#DC143C" stroke-width="1" rx="12" class="border-pulse"/>

  <!-- CRT scanline overlay (very subtle) -->
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="4" y2="0" stroke="#000" stroke-width="1" opacity="0.03"/>
  </pattern>
  <rect y="38" width="850" height="412" fill="url(#scanlines)" rx="0"/>

  <!-- LINE 1: $ whoami -->
  <g clip-path="url(#r0)">
    <text x="30" y="72" class="prompt">$</text>
    <text x="48" y="72" class="cmd">whoami</text>
  </g>

  <!-- LINE 2: separator -->
  <g clip-path="url(#r1)">
    <text x="30" y="100" class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  </g>

  <!-- LINE 3: Name -->
  <g clip-path="url(#r2)">
    <text x="38" y="130" class="label">Name</text>
    <text x="140" y="130" class="accent">→</text>
    <text x="165" y="130" class="value">Abhirag S V</text>
  </g>

  <!-- LINE 4: DOB -->
  <g clip-path="url(#r3)">
    <text x="38" y="158" class="label">DOB</text>
    <text x="140" y="158" class="accent">→</text>
    <text x="165" y="158" class="value">12-02-2005</text>
  </g>

  <!-- LINE 5: Location -->
  <g clip-path="url(#r4)">
    <text x="38" y="186" class="label">Location</text>
    <text x="140" y="186" class="accent">→</text>
    <text x="165" y="186" class="value">Trivandrum, Kerala</text>
  </g>

  <!-- LINE 6: Role -->
  <g clip-path="url(#r5)">
    <text x="38" y="214" class="label">Role</text>
    <text x="140" y="214" class="accent">→</text>
    <text x="165" y="214" class="value">Full-Stack Web Developer</text>
  </g>  

  <!-- LINE 7: Degree -->
  <g clip-path="url(#r6)">
    <text x="38" y="242" class="label">Degree</text>
    <text x="140" y="242" class="accent">→</text>
    <text x="165" y="242" class="value">BCA (Bachelor of Computer Applications)</text>
  </g>

  <!-- LINE 8: Focus -->
  <g clip-path="url(#r7)">
    <text x="38" y="270" class="label">Focus</text>
    <text x="140" y="270" class="accent">→</text>
    <text x="165" y="270" class="value">Python Django · Next.js · MERN Stack · UI/UX · AI</text>
  </g>

  <!-- LINE 9: Interests -->
  <g clip-path="url(#r8)">
    <text x="38" y="298" class="label">Interests</text>
    <text x="140" y="298" class="accent">→</text>
    <text x="165" y="298" class="value">Building immersive systems, Clean code, UI/UX</text>
  </g>

  <!-- LINE 10: Hobbies -->
  <g clip-path="url(#r9)">
    <text x="38" y="326" class="label">Hobbies</text>
    <text x="140" y="326" class="accent">→</text>
    <text x="165" y="326" class="value">Working out, football, basketball, volleyball, running, coding...</text>
  </g>

  <!-- LINE 11: Status -->
  <g clip-path="url(#r10)">
    <text x="38" y="354" class="label">Status</text>
    <text x="140" y="354" class="accent">→</text>
    <text x="165" y="354" class="value">Learning &amp; building — step by step</text>
  </g>

  <!-- LINE 12: separator -->
  <g clip-path="url(#r11)">
    <text x="30" y="382" class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  </g>

  <!-- Final prompt with blinking cursor (appears after all typing) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.1s" fill="freeze"/>
    <text x="30" y="418" class="prompt">$</text>
    <rect x="48" y="404" width="9" height="17" fill="#DC143C" rx="1" class="cursor"/>
  </g>
</svg>
